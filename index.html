<!DOCTYPE html>
<html lang="pt-BR">
 <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
 </head>

 <body>
    <h1>Lista de Tarefas</h1>

    <form id="form-tarefas" class="form-tarefas" novalidate>
      <label for="tarefas" class="visually-hidden">Nova tarefa</label>
      <input type="text" id="tarefas" placeholder="Digite uma tarefa" autocomplete="off">
      <button type="submit">Adicionar</button>
    </form>

    <ul id="lista"></ul>

    <script src="script.js" defer></script>
 </body>
</html>
